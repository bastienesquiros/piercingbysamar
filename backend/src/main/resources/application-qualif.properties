# ── Database ────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── Flyway (seed activé comme en dev) ───────────────────────
spring.flyway.locations=classpath:db/migration,classpath:db/seed

# ── JPA ─────────────────────────────────────────────────────
spring.jpa.show-sql=false

# ── Logging ─────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.besquiros.piercingbysamar=DEBUG

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}

# ── Stripe ──────────────────────────────────────────────────
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.success-url=${FRONTEND_URL}/order/confirmation
stripe.cancel-url=${FRONTEND_URL}/checkout

# ── Mail (Mailtrap sandbox) ──────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
app.mail.from=${MAIL_FROM}

# ── Storage Cloudflare R2 ────────────────────────────────────
storage.endpoint=${S3_ENDPOINT}
storage.bucket=${S3_BUCKET}
storage.access-key=${S3_ACCESS_KEY}
storage.secret-key=${S3_SECRET_KEY}
storage.public-url=${S3_PUBLIC_URL}

# ── Swagger (actif en qualif) ────────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/api-docs
