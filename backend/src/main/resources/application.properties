spring.application.name=piercingbysamar
spring.jpa.open-in-view=false

# ── Upload ────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ── Database (driver commun) ──────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate

# ── Flyway ───────────────────────────────────────────────────
# locations défini par profil (seed uniquement en dev)

# ── JWT ──────────────────────────────────────────────────────
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Mail (SMTP commun) ───────────────────────────────────────
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.shop-name=Piercing by Samar
app.mail.whatsapp=${WHATSAPP_NUMBER:212781570083}
app.mail.admin-email=${ADMIN_EMAIL:samar@piercingbysamar.com}
app.mail.google-review-url=${GOOGLE_REVIEW_URL:https://maps.app.goo.gl/b4qDcoBaafQaAqzMA}

