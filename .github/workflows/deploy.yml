name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  # ── Tests ────────────────────────────────────────────────────
  test-backend:
    name: Tests backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin

      - name: Cache Maven
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: maven-

      - name: Run tests
        working-directory: backend
        run: ./mvnw test -q

  test-frontend:
    name: Tests frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Prepare Nuxt
        working-directory: frontend
        run: npx nuxt prepare

      - name: Run tests
        working-directory: frontend
        run: npm test

  # ── Build & Push images ──────────────────────────────────────
  build-push:
    name: Build & push images
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve environment tag
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TAG=prod" >> $GITHUB_OUTPUT
          else
            echo "TAG=qualif" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO }}/backend:${{ steps.env.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO }}/frontend:${{ steps.env.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ───────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Resolve compose file
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "COMPOSE=docker-compose.yml" >> $GITHUB_OUTPUT
          else
            echo "COMPOSE=docker-compose.qualif.yml" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f ${{ steps.env.outputs.COMPOSE }} pull
            docker compose -f ${{ steps.env.outputs.COMPOSE }} up -d --remove-orphans
            docker image prune -f