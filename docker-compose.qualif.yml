services:

  # ── Frontend Nuxt ─────────────────────────────────────────────
  frontend:
    image: ghcr.io/bastienesquiros/piercingbysamar/frontend:qualif
    container_name: pbs_frontend_qualif
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: http://${VPS_HOST}:8081
      NUXT_PUBLIC_STRIPE_KEY: ${STRIPE_PUBLIC_KEY}
      NUXT_PUBLIC_SITE_URL: http://${VPS_HOST}:3001
      NUXT_OG_IMAGE_SECRET: ${NUXT_OG_IMAGE_SECRET}
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - qualif

  # ── Backend Spring Boot ───────────────────────────────────────
  backend:
    image: ghcr.io/bastienesquiros/piercingbysamar/backend:qualif
    container_name: pbs_backend_qualif
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: qualif
      DB_HOST: db_qualif
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL: http://${VPS_HOST}:3001
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-212781570083}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    ports:
      - "8081:8080"
    depends_on:
      db_qualif:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - qualif

  # ── PostgreSQL qualif ─────────────────────────────────────────
  db_qualif:
    image: postgres:16-alpine
    container_name: pbs_db_qualif
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pbs_pgdata_qualif:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qualif

volumes:
  pbs_pgdata_qualif:

networks:
  qualif:
    name: pbs_qualif
    driver: bridge
