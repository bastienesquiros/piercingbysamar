name: pbs-qualif

services:

  # ── Frontend Nuxt ─────────────────────────────────────────────
  frontend:
    image: ghcr.io/bastienesquiros/piercingbysamar/frontend:qualif
    container_name: pbs_frontend_qualif
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_API_BASE: http://backend:8080
      NUXT_PUBLIC_STRIPE_KEY: ${STRIPE_PUBLIC_KEY}
      NUXT_PUBLIC_STRIPE_ENABLED: ${STRIPE_ENABLED:-true}
      NUXT_PUBLIC_SITE_URL: https://qualif.piercingbysamar.com
      NUXT_OG_IMAGE_SECRET: ${NUXT_OG_IMAGE_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pbs_qualif
      - proxy_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy_net
      # HTTPS + basicauth
      - traefik.http.routers.pbs-qualif.rule=Host(`qualif.piercingbysamar.com`)
      - traefik.http.routers.pbs-qualif.entrypoints=websecure
      - traefik.http.routers.pbs-qualif.tls.certresolver=main
      - traefik.http.routers.pbs-qualif.middlewares=basicauth@file
      - traefik.http.services.pbs-qualif.loadbalancer.server.port=3000
      # Router /api/ sans basicauth (backend gere son propre auth JWT)
      - traefik.http.routers.pbs-qualif-api.rule=Host(`qualif.piercingbysamar.com`) && PathPrefix(`/api/`)
      - traefik.http.routers.pbs-qualif-api.entrypoints=websecure
      - traefik.http.routers.pbs-qualif-api.tls.certresolver=main
      - traefik.http.routers.pbs-qualif-api.service=pbs-qualif
      # HTTP → HTTPS redirect
      - traefik.http.routers.pbs-qualif-http.rule=Host(`qualif.piercingbysamar.com`)
      - traefik.http.routers.pbs-qualif-http.entrypoints=web
      - traefik.http.routers.pbs-qualif-http.middlewares=https-redirect@file

  # ── Backend Spring Boot ───────────────────────────────────────
  backend:
    image: ghcr.io/bastienesquiros/piercingbysamar/backend:qualif
    container_name: pbs_backend_qualif
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: qualif
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      APP_STRIPE_ENABLED: ${STRIPE_ENABLED:-true}
      FRONTEND_URL: https://qualif.piercingbysamar.com
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-212781570083}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - pbs_qualif

  # ── PostgreSQL qualif ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pbs_db_qualif
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pbs_pgdata_qualif:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pbs_qualif

volumes:
  pbs_pgdata_qualif:

networks:
  pbs_qualif:
    name: pbs_qualif
    driver: bridge
  proxy_net:
    name: proxy_net
    external: true
