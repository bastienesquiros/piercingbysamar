services:

  # ── Traefik (reverse proxy + SSL Let's Encrypt) ──────────────
  traefik:
    image: traefik:latest
    container_name: pbs_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.pbsresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.pbsresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.pbsresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - pbs_proxy

  # ── Frontend Nuxt ─────────────────────────────────────────────
  frontend:
    image: ghcr.io/bastienesquiros/piercingbysamar/frontend:prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pbs_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_API_BASE: http://backend:8080
      NUXT_PUBLIC_API_BASE: https://api.piercingbysamar.com
      NUXT_PUBLIC_STRIPE_KEY: ${STRIPE_PUBLIC_KEY}
      NUXT_PUBLIC_SITE_URL: https://piercingbysamar.com
      NUXT_OG_IMAGE_SECRET: ${NUXT_OG_IMAGE_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pbs_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=pbs_proxy
      # HTTPS
      - traefik.http.routers.pbs-front.rule=Host(`piercingbysamar.com`) || Host(`www.piercingbysamar.com`)
      - traefik.http.routers.pbs-front.entrypoints=websecure
      - traefik.http.routers.pbs-front.tls.certresolver=pbsresolver
      - traefik.http.services.pbs-front.loadbalancer.server.port=3000
      # Redirect HTTP → HTTPS
      - traefik.http.routers.pbs-front-http.rule=Host(`piercingbysamar.com`) || Host(`www.piercingbysamar.com`)
      - traefik.http.routers.pbs-front-http.entrypoints=web
      - traefik.http.routers.pbs-front-http.middlewares=https-redirect
      - traefik.http.middlewares.https-redirect.redirectscheme.scheme=https

  # ── Backend Spring Boot ───────────────────────────────────────
  backend:
    image: ghcr.io/bastienesquiros/piercingbysamar/backend:prod
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pbs_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL: https://piercingbysamar.com
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-212781570083}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - pbs_internal
      - pbs_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=pbs_proxy
      # HTTPS
      - traefik.http.routers.pbs-api.rule=Host(`api.piercingbysamar.com`)
      - traefik.http.routers.pbs-api.entrypoints=websecure
      - traefik.http.routers.pbs-api.tls.certresolver=pbsresolver
      - traefik.http.services.pbs-api.loadbalancer.server.port=8080
      # Redirect HTTP → HTTPS
      - traefik.http.routers.pbs-api-http.rule=Host(`api.piercingbysamar.com`)
      - traefik.http.routers.pbs-api-http.entrypoints=web
      - traefik.http.routers.pbs-api-http.middlewares=https-redirect

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pbs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pbs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pbs_internal

volumes:
  pbs_pgdata:

networks:
  pbs_internal:
    name: pbs_internal
    internal: true
  pbs_proxy:
    name: pbs_proxy
    driver: bridge
